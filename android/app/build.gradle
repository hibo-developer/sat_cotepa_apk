apply plugin: 'com.android.application'

android {
    namespace = "com.cotepa.sat"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.cotepa.sat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    def resolveSigningValue = { String envName, String propertyName, String defaultValue = null ->
        def envValue = System.getenv(envName)
        if (envValue != null && envValue.toString().trim()) {
            return envValue.toString().trim()
        }

        if (project.hasProperty(propertyName)) {
            def propertyValue = project.property(propertyName)?.toString()?.trim()
            if (propertyValue) {
                return propertyValue
            }
        }

        return defaultValue
    }

    def releaseKeystorePath = resolveSigningValue("KEYSTORE_FILE", "RELEASE_KEYSTORE_FILE", "../../sat-release.keystore")
    def releaseKeystoreFile = file(releaseKeystorePath)
    def releaseStorePassword = resolveSigningValue("KEYSTORE_PASSWORD", "RELEASE_KEYSTORE_PASSWORD")
    def releaseKeyPassword = resolveSigningValue("KEY_PASSWORD", "RELEASE_KEY_PASSWORD")
    def releaseKeyAlias = resolveSigningValue("KEY_ALIAS", "RELEASE_KEY_ALIAS", "sat-key")
    def releaseSigningAvailable =
        releaseKeystoreFile.exists() &&
        releaseStorePassword &&
        releaseKeyPassword &&
        releaseKeyAlias

    def releaseBuildRequested = gradle.startParameter.taskNames.any { taskName ->
        def normalized = taskName?.toString()?.toLowerCase()
        normalized?.contains('release') || normalized?.contains('bundle')
    }

    if (releaseBuildRequested && !releaseSigningAvailable) {
        def missingParts = []
        if (!releaseKeystoreFile.exists()) missingParts << "keystore (${releaseKeystoreFile})"
        if (!releaseStorePassword) missingParts << "KEYSTORE_PASSWORD / RELEASE_KEYSTORE_PASSWORD"
        if (!releaseKeyPassword) missingParts << "KEY_PASSWORD / RELEASE_KEY_PASSWORD"
        if (!releaseKeyAlias) missingParts << "KEY_ALIAS / RELEASE_KEY_ALIAS"

        println "--------------------------------------------------------------------------------"
        println "ADVERTENCIA: Falta la firma release de Android. El APK/Bundle no estará firmado."
        println "Configura: " + missingParts.join(', ')
        println "--------------------------------------------------------------------------------"
    }

    signingConfigs {
        if (releaseSigningAvailable) {
            release {
                storeFile releaseKeystoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningAvailable) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
