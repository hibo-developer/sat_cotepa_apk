name: Deploy web to DonDominio

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dondominio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
      DONDOMINIO_FTP_SERVER: ${{ secrets.DONDOMINIO_FTP_SERVER || vars.DONDOMINIO_FTP_SERVER }}
      DONDOMINIO_FTP_USERNAME: ${{ secrets.DONDOMINIO_FTP_USERNAME || vars.DONDOMINIO_FTP_USERNAME }}
      DONDOMINIO_FTP_PASSWORD: ${{ secrets.DONDOMINIO_FTP_PASSWORD || vars.DONDOMINIO_FTP_PASSWORD }}
      DONDOMINIO_FTP_SERVER_DIR: ${{ secrets.DONDOMINIO_FTP_SERVER_DIR || vars.DONDOMINIO_FTP_SERVER_DIR }}
      DONDOMINIO_FTP_PROTOCOL: ${{ secrets.DONDOMINIO_FTP_PROTOCOL || vars.DONDOMINIO_FTP_PROTOCOL || 'ftp' }}
      DONDOMINIO_FTP_PORT: ${{ secrets.DONDOMINIO_FTP_PORT || vars.DONDOMINIO_FTP_PORT || '21' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          missing=()

          [ -z "${VITE_SUPABASE_URL}" ] && missing+=("VITE_SUPABASE_URL")
          [ -z "${VITE_SUPABASE_ANON_KEY}" ] && missing+=("VITE_SUPABASE_ANON_KEY")
          [ -z "${DONDOMINIO_FTP_SERVER}" ] && missing+=("DONDOMINIO_FTP_SERVER")
          [ -z "${DONDOMINIO_FTP_USERNAME}" ] && missing+=("DONDOMINIO_FTP_USERNAME")
          [ -z "${DONDOMINIO_FTP_PASSWORD}" ] && missing+=("DONDOMINIO_FTP_PASSWORD")
          [ -z "${DONDOMINIO_FTP_SERVER_DIR}" ] && missing+=("DONDOMINIO_FTP_SERVER_DIR")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Faltan secrets requeridos: ${missing[*]}"
            exit 1
          fi

      - name: Normalize FTP connection inputs
        id: ftp
        shell: bash
        run: |
          raw_server="${DONDOMINIO_FTP_SERVER}"
          server="${raw_server#ftp://}"
          server="${server#ftps://}"
          server="${server%%/*}"

          server_dir="${DONDOMINIO_FTP_SERVER_DIR}"
          if [ -z "${server_dir}" ]; then
            server_dir="/"
          fi
          case "${server_dir}" in
            /*) ;;
            *) server_dir="/${server_dir}" ;;
          esac
          case "${server_dir}" in
            */) ;;
            *) server_dir="${server_dir}/" ;;
          esac

          protocol="${DONDOMINIO_FTP_PROTOCOL}"
          port="${DONDOMINIO_FTP_PORT}"

          if [ -z "${server}" ]; then
            echo "DONDOMINIO_FTP_SERVER no es valido tras normalizar"
            exit 1
          fi

          echo "server=${server}" >> "$GITHUB_OUTPUT"
          echo "server_dir=${server_dir}" >> "$GITHUB_OUTPUT"
          echo "protocol=${protocol}" >> "$GITHUB_OUTPUT"
          echo "port=${port}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Inject runtime config
        shell: bash
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "Faltan secrets VITE_SUPABASE_URL o VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

          cat > dist/app-config.js <<EOF
          window.__APP_CONFIG__ = Object.assign({}, window.__APP_CONFIG__ || {}, {"SUPABASE_URL":"${VITE_SUPABASE_URL}","SUPABASE_ANON_KEY":"${VITE_SUPABASE_ANON_KEY}"});
          EOF

      - name: Prepare DonDominio package (htaccess + sw)
        shell: pwsh
        run: ./scripts/prepare-web-dondominio.ps1

      - name: Resolve package path
        id: package
        shell: pwsh
        run: |
          $latest = Get-ChildItem -Path ./release-web-dondominio -Directory |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $latest) {
            throw "No se encontro carpeta en release-web-dondominio"
          }

          "path=$($latest.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Deploy to DonDominio by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp.outputs.server }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          username: ${{ env.DONDOMINIO_FTP_USERNAME }}
          password: ${{ env.DONDOMINIO_FTP_PASSWORD }}
          server-dir: ${{ steps.ftp.outputs.server_dir }}
          local-dir: ${{ steps.package.outputs.path }}/
          exclude: |
            **/.git*
            **/.git*/**
